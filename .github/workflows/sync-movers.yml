name: Sync Movers to README

on:
  push:
    branches: [main]
    paths:
      - 'Movers.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Movers into README
        run: python3 .github/scripts/inject_movers.py

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: sync Movers section in README" &&
            git push
          )

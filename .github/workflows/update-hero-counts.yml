name: Update Hero Counts

on:
  push:
    branches: [main]
    paths:
      - 'Tools.md'
      - 'AI_Tools.md'
      - 'United_States_Investigations.md'
      - 'Geolocation.md'
      - 'Recommended_Reading.md'
      - 'Bookmarks.md'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Recompute category counts in hero.svg
        run: python3 .github/scripts/update_hero_counts.py

      - name: Commit updated hero.svg
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet assets/readme/hero.svg || (
            git add assets/readme/hero.svg &&
            git commit -m "chore: refresh hero.svg category counts" &&
            git pull --rebase origin main &&
            git push
          )

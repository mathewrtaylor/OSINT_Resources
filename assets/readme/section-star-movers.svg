     role="img" aria-labelledby="sm-title sm-desc">
  <title id="sm-title">Star Movers</title>
  <desc id="sm-desc">The fastest-growing OSINT repositories over the last 30 days, tracked automatically.</desc>

  <rect width="1200" height="140" rx="22" fill="#0b0e12"/>
  <rect x="0.75" y="0.75" width="1198.5" height="138.5" rx="21.25" fill="none" stroke="#1d232b" stroke-width="1.5"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

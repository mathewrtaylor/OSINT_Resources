    </g>
    <path transform="translate(1097 28) scale(1.15)" fill="#ffb020" d="M10 0 12.2 6.6 19 7 13.6 11.2 15.5 18 10 14.1 4.5 18 6.4 11.2 1 7 7.8 6.6z"/>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="200" viewBox="0 0 1200 200"
     role="img" aria-labelledby="wf-title wf-desc">
  <title id="wf-title">How this list stays current</title>
  <desc id="wf-desc">Pipeline diagram: new repositories are scanned, vetted into categories, tracked for star growth and staleness, then the README and Movers list are refreshed on a weekly cycle.</desc>

  <rect width="1200" height="200" rx="26" fill="#0b0e12"/>
  <rect x="0.75" y="0.75" width="1198.5" height="198.5" rx="25.25" fill="none" stroke="#1d232b" stroke-width="1.5"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="56" y="46" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="2" fill="#7a8592">SCAN &#8594; VET &#8594; TRACK &#8594; REFRESH</text>

    <!-- stage chain -->
    <g>
      <!-- connector line spanning all stages -->
      <line x1="130" y1="130" x2="1085" y2="130" stroke="#262e37" stroke-width="1.5"/>

      <!-- stage 1 -->
      <g transform="translate(56 100)">
        <circle cx="16" cy="30" r="6" fill="#0b0e12" stroke="#ffb020" stroke-width="2"/>
        <text x="0" y="70" font-size="14.5" font-weight="600" fill="#e9edf1">Scan GitHub</text>
        <text x="0" y="90" font-size="12.5" fill="#7a8592">new &amp; trending repos</text>
      </g>

      <!-- stage 2 -->
      <g transform="translate(316 100)">
        <circle cx="16" cy="30" r="6" fill="#0b0e12" stroke="#ffb020" stroke-width="2"/>
        <text x="0" y="70" font-size="14.5" font-weight="600" fill="#e9edf1">Vet &amp; categorize</text>
        <text x="0" y="90" font-size="12.5" fill="#7a8592">sorted into 11 files</text>
      </g>

      <!-- stage 3 -->
      <g transform="translate(596 100)">
        <circle cx="16" cy="30" r="6" fill="#0b0e12" stroke="#ffb020" stroke-width="2"/>
        <text x="0" y="70" font-size="14.5" font-weight="600" fill="#e9edf1">Track movement</text>
        <text x="0" y="90" font-size="12.5" fill="#7a8592">stars, removals, staleness</text>
      </g>

      <!-- stage 4 -->
      <g transform="translate(876 100)">
        <circle cx="16" cy="30" r="7.5" fill="#ffb020" stroke="#ffb020" stroke-width="2"/>
        <text x="0" y="70" font-size="14.5" font-weight="600" fill="#e9edf1">Refresh weekly</text>
        <text x="0" y="90" font-size="12.5" fill="#7a8592">README + Movers auto-synced</text>
      </g>
    </g>
  </g>
</svg>
